
<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popis</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#111827;
      --soft:#1f2937;
      --line:#334155;
      --text:#f8fafc;
      --muted:#94a3b8;
      --accent:#22c55e;
      --accent2:#38bdf8;
      --danger:#ef4444;
      --warn:#f59e0b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#0f172a 0%,#111827 100%);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:16px;
    }
    .card{
      background:rgba(17,24,39,.92);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      backdrop-filter: blur(8px);
      margin-bottom:16px;
    }
    h1,h2,h3,p{margin:0}
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
    }
    .title{
      font-size:28px;
      font-weight:700;
    }
    .sub{
      color:var(--muted);
      font-size:14px;
      margin-top:4px;
    }
    .stack{display:flex; flex-direction:column; gap:12px}
    .row{display:flex; gap:10px}
    .row > *{flex:1}
    input, select, textarea, button{
      width:100%;
      border:none;
      outline:none;
      border-radius:14px;
      padding:14px;
      font-size:16px;
    }
    input, select, textarea{
      background:var(--soft);
      color:var(--text);
      border:1px solid var(--line);
    }
    textarea{min-height:90px; resize:vertical}
    button{
      cursor:pointer;
      font-weight:700;
    }
    .btn{
      background:var(--accent);
      color:#052e16;
    }
    .btn-secondary{
      background:var(--accent2);
      color:#082f49;
    }
    .btn-ghost{
      background:transparent;
      border:1px solid var(--line);
      color:var(--text);
    }
    .btn-danger{
      background:var(--danger);
      color:white;
      width:auto;
      min-width:54px;
    }
    .hidden{display:none !important}
    .section-title{
      font-size:18px;
      font-weight:700;
      margin-bottom:10px;
    }
    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:14px;
    }
    .item{
      background:#0b1220;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }
    .item-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }
    .item-name{
      font-size:20px;
      font-weight:700;
      line-height:1.2;
    }
    .badges{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .badge{
      background:#1e293b;
      border:1px solid var(--line);
      color:var(--text);
      padding:6px 10px;
      border-radius:999px;
      font-size:13px;
    }
    .badge.green{background:#14532d;border-color:#166534}
    .badge.orange{background:#78350f;border-color:#92400e}
    .meta{
      color:var(--muted);
      font-size:14px;
      margin-top:10px;
      line-height:1.45;
    }
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr auto;
      gap:8px;
      margin-top:12px;
    }
    .empty{
      text-align:center;
      color:var(--muted);
      padding:24px 10px;
      border:1px dashed var(--line);
      border-radius:18px;
      margin-top:12px;
    }
    .pill{
      display:inline-block;
      background:#0b1220;
      color:var(--muted);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
    }
    .notice{
      background:#172554;
      border:1px solid #1d4ed8;
      color:#dbeafe;
      padding:12px;
      border-radius:14px;
      font-size:14px;
      line-height:1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">Popis</div>
        <div class="sub">Zajednička shopping lista</div>
      </div>
      <div id="userPill" class="pill hidden"></div>
    </div>

    <div id="authCard" class="card stack">
      <div class="section-title">Prijava</div>
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Lozinka" />
      <div class="row">
        <button class="btn" onclick="signIn()">Prijava</button>
        <button class="btn-secondary" onclick="signUp()">Registracija</button>
      </div>
      <div class="notice">
        Ako si user napravio ručno u Supabaseu, prijavi se tim emailom i lozinkom.
      </div>
    </div>

    <div id="appCard" class="hidden">
      <div class="card stack">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
          <div>
            <div class="section-title">Dodaj artikl</div>
            <div class="sub">Brzo dodavanje u listu</div>
          </div>
          <button class="btn-ghost" style="width:auto;padding:10px 14px" onclick="signOutUser()">Odjava</button>
        </div>

        <input id="name" placeholder="Naziv proizvoda" />
        <div class="row">
          <input id="quantity" type="number" step="0.01" placeholder="Količina" />
          <select id="unit">
            <option value="">Jedinica</option>
            <option value="kom">kom</option>
            <option value="g">g</option>
            <option value="kg">kg</option>
            <option value="ml">ml</option>
            <option value="l">l</option>
            <option value="pak">pak</option>
          </select>
        </div>
        <div class="row">
          <input id="weight_note" placeholder="Gramaža npr. 500g" />
          <input id="store_note" placeholder="Dućan npr. Lidl" />
        </div>
        <textarea id="comment" placeholder="Komentar"></textarea>
        <button class="btn" onclick="addItem()">Dodaj na listu</button>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
          <div>
            <div class="section-title">Artikli</div>
            <div class="sub">Zajednička lista za vas dvoje</div>
          </div>
          <button class="btn-ghost" style="width:auto;padding:10px 14px" onclick="loadItems()">Osvježi</button>
        </div>

        <div id="list" class="list"></div>
        <div id="empty" class="empty hidden">Nema još artikala.</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://bufzspxjanetqbjdepgx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_bTUnpulBH4v5FgGbKutLog_uleNGDaS";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentHouseholdId = null;
    let realtimeChannel = null;

    function qs(id){
      return document.getElementById(id);
    }

    function showMessage(text){
      alert(text);
    }

    async function signIn(){
      const email = qs("email").value.trim();
      const password = qs("password").value.trim();

      if (!email || !password) {
        showMessage("Upiši email i lozinku.");
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        showMessage("Greška prijave: " + error.message);
        return;
      }

      await initApp();
    }

    async function signUp(){
      const email = qs("email").value.trim();
      const password = qs("password").value.trim();

      if (!email || !password) {
        showMessage("Upiši email i lozinku.");
        return;
      }

      const { error } = await supabase.auth.signUp({ email, password });
      if (error) {
        showMessage("Greška registracije: " + error.message);
        return;
      }

      showMessage("Registracija poslana.");
    }

    async function signOutUser(){
      if (realtimeChannel) {
        await supabase.removeChannel(realtimeChannel);
        realtimeChannel = null;
      }

      await supabase.auth.signOut();
      currentUser = null;
      currentHouseholdId = null;
      qs("authCard").classList.remove("hidden");
      qs("appCard").classList.add("hidden");
      qs("userPill").classList.add("hidden");
    }

    async function getCurrentUser(){
      const { data, error } = await supabase.auth.getUser();
      if (error) return null;
      return data.user || null;
    }

    async function loadHousehold(){
      const { data, error } = await supabase
        .from("household_members")
        .select("household_id")
        .eq("user_id", currentUser.id)
        .limit(1)
        .maybeSingle();

      if (error) {
        showMessage("Greška kod učitavanja liste: " + error.message);
        return null;
      }

      if (!data) {
        showMessage("Ovaj user nije povezan s listom.");
        return null;
      }

      return data.household_id;
    }

    async function addItem(){
      const name = qs("name").value.trim();
      const quantityValue = qs("quantity").value.trim();
      const unit = qs("unit").value;
      const weight_note = qs("weight_note").value.trim();
      const store_note = qs("store_note").value.trim();
      const comment = qs("comment").value.trim();

      if (!name) {
        showMessage("Upiši naziv proizvoda.");
        return;
      }

      const payload = {
        household_id: currentHouseholdId,
        created_by: currentUser.id,
        name,
        quantity: quantityValue ? Number(quantityValue) : null,
        unit: unit || null,
        weight_note: weight_note || null,
        store_note: store_note || null,
        comment: comment || null,
        is_bought: false,
        is_missing: false
      };

      const { error } = await supabase.from("shopping_items").insert(payload);
      if (error) {
        showMessage("Greška spremanja: " + error.message);
        return;
      }

      qs("name").value = "";
      qs("quantity").value = "";
      qs("unit").value = "";
      qs("weight_note").value = "";
      qs("store_note").value = "";
      qs("comment").value = "";

      await loadItems();
    }

    async function loadItems(){
      const { data, error } = await supabase
        .from("shopping_items")
        .select("*")
        .eq("household_id", currentHouseholdId)
        .order("created_at", { ascending: false });

      if (error) {
        showMessage("Greška učitavanja artikala: " + error.message);
        return;
      }

      renderItems(data || []);
    }

    function renderItems(items){
      const list = qs("list");
      const empty = qs("empty");

      list.innerHTML = "";

      if (!items.length) {
        empty.classList.remove("hidden");
        return;
      }

      empty.classList.add("hidden");

      items.forEach(item => {
        const quantityText = item.quantity ? `${item.quantity}${item.unit ? " " + item.unit : ""}` : "";
        const meta = [
          quantityText,
          item.weight_note ? `Gramaža: ${item.weight_note}` : "",
          item.store_note ? `Dućan: ${item.store_note}` : "",
          item.comment ? `Komentar: ${item.comment}` : ""
        ].filter(Boolean).join(" • ");

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="item-top">
            <div>
              <div class="item-name">${escapeHtml(item.name)}</div>
              <div class="badges">
                ${item.is_bought ? `<span class="badge green">Kupljeno</span>` : ``}
                ${item.is_missing ? `<span class="badge orange">Nema</span>` : ``}
                ${!item.is_bought && !item.is_missing ? `<span class="badge">Za kupiti</span>` : ``}
              </div>
              ${meta ? `<div class="meta">${escapeHtml(meta)}</div>` : ``}
            </div>
          </div>
          <div class="actions">
            <button class="btn" onclick="toggleBought('${item.id}', ${item.is_bought})">
              ${item.is_bought ? "Vrati" : "Kupljeno"}
            </button>
            <button class="btn-secondary" onclick="toggleMissing('${item.id}', ${item.is_missing})">
              ${item.is_missing ? "Vrati" : "Nema"}
            </button>
            <button class="btn-danger" onclick="deleteItem('${item.id}')">X</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    async function toggleBought(id, currentValue){
      const { error } = await supabase
        .from("shopping_items")
        .update({ is_bought: !currentValue, is_missing: false })
        .eq("id", id);

      if (error) {
        showMessage("Greška updatea: " + error.message);
        return;
      }

      await loadItems();
    }

    async function toggleMissing(id, currentValue){
      const { error } = await supabase
        .from("shopping_items")
        .update({ is_missing: !currentValue, is_bought: false })
        .eq("id", id);

      if (error) {
        showMessage("Greška updatea: " + error.message);
        return;
      }

      await loadItems();
    }

    async function deleteItem(id){
      const { error } = await supabase
        .from("shopping_items")
        .delete()
        .eq("id", id);

      if (error) {
        showMessage("Greška brisanja: " + error.message);
        return;
      }

      await loadItems();
    }

    function escapeHtml(text){
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    async function initApp(){
      currentUser = await getCurrentUser();

      if (!currentUser) {
        qs("authCard").classList.remove("hidden");
        qs("appCard").classList.add("hidden");
        qs("userPill").classList.add("hidden");
        return;
      }

      currentHouseholdId = await loadHousehold();
      if (!currentHouseholdId) return;

      qs("userPill").textContent = currentUser.email;
      qs("userPill").classList.remove("hidden");
      qs("authCard").classList.add("hidden");
      qs("appCard").classList.remove("hidden");

      await loadItems();

      if (!realtimeChannel) {
        realtimeChannel = supabase
          .channel("shopping-realtime")
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table: "shopping_items" },
            async () => { await loadItems(); }
          )
          .subscribe();
      }
    }

    window.signIn = signIn;
    window.signUp = signUp;
    window.signOutUser = signOutUser;
    window.addItem = addItem;
    window.toggleBought = toggleBought;
    window.toggleMissing = toggleMissing;
    window.deleteItem = deleteItem;

    initApp();
  </script>
</body>
</html>
